<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Note</title>
    <link rel="stylesheet" href="../../styles/common.css">
    <link rel="stylesheet" href="../../styles/note.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.4/dist/katex.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&display=swap">
  </head>
  <body>
    <div id="titlebar">
      <button id="new-note" class="title-btn">➕</button>
      <div>
        <button id="view-toggle" class="title-btn" style="display:none;">both</button>
        <button id="only-toggle" class="title-btn" style="display:none;">✏️</button>
        <button class="title-btn format-btn" data-action="bold" title="加粗"><b>A</b></button>
        <button class="title-btn format-btn" data-action="italic" title="斜体"><i>A</i></button>
        <button class="title-btn format-btn" data-action="underline" title="下划线"><u>A</u></button>
        <button class="title-btn format-btn" data-action="strikethrough" title="删除线"><s>A</s></button>
        <button class="title-btn format-btn" data-action="code" title="行内代码">&lt;/&gt;</button>
        <button class="title-btn format-btn" data-action="quote" title="引用">"</button>
        <span class="fb-divider"></span>
        <button id="pin-toggle" class="title-btn" title="置顶/取消置顶">📌</button>
        <button id="open-list" class="title-btn">List</button>
        <button onclick="window.close()" class="title-btn">✖</button>
      </div>
    </div>

    <div id="loading-indicator" style="display: none;">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading...</div>
    </div>

    <textarea id="editor" placeholder="Write here..."></textarea>
    <div id="preview"></div>

    <script src="note.js"></script>
  </body>
</html>
